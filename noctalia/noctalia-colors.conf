# Auto-generated by Noctalia
# Template: hyprland.conf

$primary = rgb(e46c67)
$secondary = rgb(d79e5b)
$tertiary = rgb(d3d75b)
$error = rgb(b2302b)
$surface = rgb(291514)
$surface_dim = rgb(1c0e0d)
$surface_bright = rgb(4c2625)
$shadow = rgba(756161dd)
$on_primary = rgb(251918)
$on_primary_fixed = rgb(2c2121)
$on_surface = rgb(f3f2f2) 

# Variable nueva para el fondo de pestañas con transparencia (80% opacidad = CC)
$primary_alpha = rgba(e46c67b3)
$surface_alpha = rgba(291514b3)
$error_alpha = rgba(b2302bb3)


general {
    col.active_border = $primary $secondary 45deg
    col.inactive_border = $surface_dim
    col.nogroup_border = $surface_dim
    col.nogroup_border_active = $tertiary
}

group {
    # Bordes translúcidos también se ven bien
    col.border_active = $primary_alpha
    col.border_inactive = $surface_alpha

    col.border_locked_active = $error
    col.border_locked_inactive = $surface_dim

    groupbar {
        # Aquí usamos los colores CON transparencia para ver el blur
        col.active = $primary_alpha
        col.inactive = $surface_alpha
        col.locked_active = $error_alpha
        col.locked_inactive = $surface_alpha
        
        # El texto mejor que sea opaco (sólido) para legibilidad
        text_color = $on_primary_fixed  
        text_color_inactive = $primary
    }
}

decoration {
    shadow {
        color = $shadow
    }
}

# Window Rules for States (Using Unified Syntax)
# Maximize/Fullscreen State -> Tertiary + Error Gradient (More distinction)
windowrule = border_color $tertiary $error 45deg, match:fullscreen 1
