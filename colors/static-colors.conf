# Paleta estática de Hyprland (independiente de Noctalia)
# Estructura basada en noctalia-colors.conf, con colores propios.

$primary = rgb(ff2bd6)
$secondary = rgb(39ff14)
$tertiary = rgb(ffe600)
$error = rgb(ff5a6f)
$surface = rgb(1d2330)
$surface_dim = rgb(10151f)
$surface_bright = rgb(2d3a4d)
$shadow = rgba(756166dd)
$on_primary = rgb(0b1118)
$on_primary_fixed = rgb(eaf2ff)
$on_surface = rgb(f4f7ff)

# Variantes alpha para groupbar/tab y blur
$primary_alpha = rgba(ff2bd6cc)
$surface_alpha = rgba(1d2330b3)
$error_alpha = rgba(ff5a6fb3)

general {
    # Borde activo con degradado vibrante para destacar en wallpapers claros u oscuros
    col.active_border = $primary $secondary 45deg
    col.inactive_border = $surface_dim
    col.nogroup_border = $surface_dim
    col.nogroup_border_active = $secondary
}

group {
    col.border_active = $primary_alpha
    col.border_inactive = $surface_alpha

    col.border_locked_active = $error
    col.border_locked_inactive = $surface_dim

    groupbar {
        col.active = $primary_alpha
        col.inactive = $surface_alpha
        col.locked_active = $error_alpha
        col.locked_inactive = $surface_alpha

        text_color = $on_primary_fixed
        text_color_inactive = $on_surface
    }
}

decoration {
    shadow {
        color = $shadow
    }
}

# Fullscreen con gradiente diferenciado
windowrule = border_color $secondary $tertiary 45deg, match:fullscreen 1
