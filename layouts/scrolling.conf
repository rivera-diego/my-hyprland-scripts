# ═════════════════════════════════════════════════════════════════════════════════
# │ SCROLLING LAYOUT - Configuración basada en Niri
# ═════════════════════════════════════════════════════════════════════════════════

scrolling {

    # Cuando solo hay una columna en el workspace, ocupa toda la pantalla
    fullscreen_on_one_column = true

    # Ancho por defecto de columnas (0.5 = 50% de la pantalla)
    column_width = 0.5

    # Método de enfoque: 0 = center, 1 = fit (ajustar)
    focus_fit_method = 1

    # Seguir el foco automáticamente (mover layout para mostrar ventana enfocada)
    follow_focus = true

    # Fracción mínima visible para seguir foco [0.0 - 1.0]
    follow_min_visible = 0.6

    # Anchos preconfigurados para colresize +conf/-conf
    # Equivalente a Niri: proportion 0.33333, 0.5, 1.0
    explicit_column_widths = 0.5, 1.0

    # Dirección: left/right/down/up (nuevas ventanas aparecen a la derecha)
    direction = right

    wrap_swapcol = false
    wrap_focus = false

}
