# --- AUTOSTART ---

# 1. DBUS y Environment (Crucial para estabilidad de aplicaciones)
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP
# 2. Autenticación (Polkit Gnome)
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# 3. Input Method
exec-once = fcitx5 -d

# 4. Portapapeles y Persistencia
# (Noctalia ya maneja wl-paste para el historial, solo dejamos la persistencia)
exec-once = wl-clip-persist --clipboard regular --reconnect-tries 0

# 5. Iniciar swww daemon
exec-once = swww init

# 6. Establecer imagen de fondo
exec-once = swww img /home/diego/Imágenes/ichigo.jpg

# 7. Shell y Plugins
exec-once = qs -c noctalia-shell
