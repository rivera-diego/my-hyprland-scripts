# --- VARIABLES DE ENTORNO ---
# Nvidia specific
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = __GL_SHADER_DISK_CACHE_SKIP_CLEANUP,1

# Solución CRÍTICA para consumo de CPU en Ghostty/GTK (Nvidia Busy Wait Fix)
env = __GL_YIELD,USLEEP

# Apariencia y Temas
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
# Forzar Wayland nativo en apps Qt (Mejor rendimiento)
env = QT_QPA_PLATFORM,wayland;xcb

# Nvidia Stability
# PRUEBA: Comenta la siguiente línea. Si el cursor NO desaparece, déjala comentada.
# Ahorrarás un poco de CPU y ganarás fluidez en el mouse.
#env = WLR_NO_HARDWARE_CURSORS,1

# Input / Cursor
env = XCURSOR_THEME,Breeze_Light
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Breeze_Light
env = HYPRCURSOR_SIZE,24
env = QT_CURSOR_SIZE,24

# Aplicaciones y Toolkits
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = SAL_USE_VCLPLUGIN,qt6

# XDG Specifications
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_MENU_PREFIX,arch-

# Default Apps
env = TERMINAL,ghostty
env = TERM_EMULATOR,ghostty

env = XDG_SESSION_CLASS,user


