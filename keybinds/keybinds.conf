# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                         ATAJOS DE TECLADO GENERALES                           ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ┌──────────────────────────────────────────────────────────────────────────────┐
# │                              VARIABLES                                       │
# └──────────────────────────────────────────────────────────────────────────────┘
$terminal = ghostty
$filemanager = dolphin
$scripts = ~/.config/hypr/scripts
$scripts_apps = $scripts/apps
$scripts_windows = $scripts/windows
$scripts_monitors = $scripts/monitors
$scripts_capture = $scripts/capture

# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                          LANZAR APLICACIONES                                 ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# Terminal (Ghostty)
bind = SUPER, T, exec, $scripts_apps/focus-or-launch-ghostty.sh

# Explorador de archivos
bind = SUPER, E, exec, dolphin

# Navegador web (trae a focus si está abierto, sino lo lanza)
bind = SUPER, B, exec, vivaldi-stable

# Launcher de aplicaciones (Noctalia)
bind = control, Space, exec, qs -c noctalia-shell ipc call launcher toggle
#bind = alt, tab, exec, qs -c noctalia-shell ipc call launcher windows
# Historial del portapapeles (Noctalia)
bind = SUPER, H, exec, qs -c noctalia-shell ipc call launcher clipboard


# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                         GESTIÓN DE VENTANAS                                  ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ┌──────────────────────────────────────────────────────────────────────────────┐
# │ Cerrar / Salir                                                               │
# └──────────────────────────────────────────────────────────────────────────────┘

# Cerrar ventana activa
bind = SUPER, Q, killactive,

# Cierre forzado con limpieza de procesos zombies (Electron, juegos, etc.)
# Intenta cierre normal → mata grupo de procesos → limpieza profunda
bind = ALT, F4, exec, $scripts_windows/kill-active.sh

# Salir de Hyprland
bind = SUPER SHIFT, E, exit,

# ┌──────────────────────────────────────────────────────────────────────────────┐
# │ Estados de Ventana                                                           │
# └──────────────────────────────────────────────────────────────────────────────┘

# Alternar flotante/tiling
bind = SUPER, V, togglefloating,

# Pantalla completa
bind = SUPER, F, fullscreen


# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                          GRUPOS (TABBED)                                     ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ┌──────────────────────────────────────────────────────────────────────────────┐
# │ Crear y Gestionar Grupos                                                     │
# └──────────────────────────────────────────────────────────────────────────────┘

# Agrupar ventana activa (toggle: agrupa o desagrupa)
bind = SUPER, G, togglegroup

# Ciclar entre tabs del grupo (vuelve al primero al llegar al final)
bind = SUPER, bar, changegroupactive, f

# ┌──────────────────────────────────────────────────────────────────────────────┐
# │ Mover Ventanas dentro/fuera de Grupos                                        │
# └──────────────────────────────────────────────────────────────────────────────┘

# Sacar ventana del grupo actual
bind = SUPER ALT, G, moveoutofgroup, active

# ┌──────────────────────────────────────────────────────────────────────────────┐
# │ Bloqueo de Grupos                                                            │
# └──────────────────────────────────────────────────────────────────────────────┘

# Bloquear/desbloquear grupo actual
bind = SUPER, O, lockactivegroup, toggle

# Bloquear/desbloquear TODOS los grupos globalmente
bind = SUPER SHIFT, O, lockgroups, toggle


# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                           NAVEGACIÓN Y FOCO                                  ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ┌──────────────────────────────────────────────────────────────────────────────┐
# │ Mover Foco entre Ventanas                                                    │
# └──────────────────────────────────────────────────────────────────────────────┘



# ┌──────────────────────────────────────────────────────────────────────────────┐
# │ Navegación entre Monitores                                                   │
# └──────────────────────────────────────────────────────────────────────────────┘

# Cambia el foco al otro monitor y centra el cursor automáticamente.
# Útil para escapar de juegos en pantalla completa sin usar el mouse.

bind = SUPER, TAB, exec, $scripts_monitors/monitor-switch.sh
# Mueve la ventana activa al otro monitor (toggle entre DP-1 y HDMI-A-1)
bind = SUPER, mouse:276, exec, $scripts_monitors/toggle-monitor.sh
bind = SUPER, z, exec, $scripts_monitors/toggle-monitor.sh

# Activar / Desactivar Monitor Secundario (HDMI-A-1)
bind = SUPER ALT, O, exec, $scripts_monitors/monitor-control.sh toggle

# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                              WORKSPACES                                      ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ┌──────────────────────────────────────────────────────────────────────────────┐
# │ Cambiar a Workspace                                                          │
# └──────────────────────────────────────────────────────────────────────────────┘
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6

# Foco arriba
bind = SUPER, up, movefocus, u

# Foco abajo
bind = SUPER, down, movefocus, d


# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                           CONTROLES DE MOUSE                                 ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ┌──────────────────────────────────────────────────────────────────────────────┐
# │ Navegación con Rueda del Mouse                                               │
# └──────────────────────────────────────────────────────────────────────────────┘

# Workspace anterior
bind = SUPER, mouse_down, workspace, e-1

# Workspace siguiente
bind = SUPER, mouse_up, workspace, e+1

# ┌──────────────────────────────────────────────────────────────────────────────┐
# │ Mover y Redimensionar Ventanas                                               │
# └──────────────────────────────────────────────────────────────────────────────┘

# SUPER + Click izquierdo: mover ventana
bindm = SUPER, mouse:272, movewindow

# SUPER + Click derecho: redimensionar ventana
bindm = SUPER, mouse:273, resizewindow

# ┌──────────────────────────────────────────────────────────────────────────────┐
# │ Acciones con Botones Extra del Mouse                                         │
# └──────────────────────────────────────────────────────────────────────────────┘

# SUPER + Click central: maximizar (respeta gaps)
bind = SUPER, mouse:274, fullscreen, 1
bind = SUPER, d, fullscreen, 1

# Intercambia todas las ventanas entre monitores usando método "burbuja"
# (usa workspace especial como buffer temporal para swap limpio)
bind = SUPER, F12, exec, $scripts_monitors/swap-content.sh

# SUPER + Botón lateral adelante: intercambiar ventanas entre monitores
bind = SUPER, mouse:275, exec, $scripts_monitors/swap-content.sh

bind = SUPER, code:94, exec, $scripts_monitors/swap-content.sh


# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                         CAPTURAS DE PANTALLA                                 ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# OCR: Congela pantalla → selecciona área → extrae texto con Tesseract → copia al portapapeles
# Preprocesa imagen (escala grises, contraste, 300dpi) para mejor reconocimiento
bind = SUPER, S, exec, $scripts_capture/screenshot-ocr.sh
bind = , PRINT, exec, $scripts_capture/screenshot-ocr.sh

# Editor: Congela pantalla → selecciona área → guarda en ~/Imágenes/Screenshots/
# → copia al portapapeles → abre Swappy para anotar/editar
bind = SUPER SHIFT, S, exec, $scripts_capture/screenshot-editor.sh


# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                          CONTROL DE VOLUMEN                                  ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# Subir volumen (bindel = permite repetición al mantener presionado)
bindel = , XF86AudioRaiseVolume, exec, qs -c noctalia-shell ipc call volume increase

# Bajar volumen
bindel = , XF86AudioLowerVolume, exec, qs -c noctalia-shell ipc call volume decrease

# Silenciar (bindl = se activa también con pantalla bloqueada)
bindl = , XF86AudioMute, exec, qs -c noctalia-shell ipc call volume muteOutput


# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                      ATAJOS ESPECÍFICOS DEL LAYOUT ACTIVO                    ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# Los atajos específicos de cada layout se sourcean desde:
# - keybinds_master.conf (para master)
# - keybinds_dwindle.conf (para dwindle)
# - keybinds_scrolling.conf (para scrolling)

# Se cargan automáticamente en hyprland.conf según el layout activo
