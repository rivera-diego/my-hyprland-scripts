# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                  KEYBINDS MIGRADOS DESDE NIRI - LAYOUT SCROLLING              ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ┌──────────────────────────────────────────────────────────────────────────────┐
# │                              VARIABLES                                       │
# └──────────────────────────────────────────────────────────────────────────────┘
$terminal = ghostty
$filemanager = dolphin
$browser = helium-browser

$scripts = ~/.config/hypr/scripts
$apps = $scripts/apps
$windows = $scripts/windows
$capture = $scripts/capture
$scroll = $scripts/scroll
$monitors = $scripts/monitors

# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                          LANZAR APLICACIONES                                 ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

bind = SUPER, T, exec, ghostty +new-window
bind = SUPER, E, exec, $filemanager
bind = SUPER, B, exec, $browser
bind = SUPER, U, exec, subl

bind = control, Space, exec, qs -c noctalia-shell ipc call launcher toggle
bind = SUPER, H, exec, qs -c noctalia-shell ipc call launcher clipboard

# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                         GESTIÓN DE VENTANAS                                  ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

bind = SUPER, Q, killactive,
bind = ALT, F4, exec, $windows/kill-active.sh
bind = SUPER SHIFT, E, exit,
bind = SUPER, V, togglefloating,
bind = SUPER, F, fullscreen


# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                         CAPTURAS DE PANTALLA                                 ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

bind = SUPER, S, exec, $capture/screenshot-ocr.sh
bind = , PRINT, exec, $capture/screenshot-ocr.sh
bind = SUPER SHIFT, S, exec, $capture/screenshot-editor.sh

# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                          CONTROL DE VOLUMEN                                  ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

bindel = , XF86AudioRaiseVolume, exec, qs -c noctalia-shell ipc call volume increase
bindel = , XF86AudioLowerVolume, exec, qs -c noctalia-shell ipc call volume decrease
bindl = , XF86AudioMute, exec, qs -c noctalia-shell ipc call volume muteOutput

# ┌──────────────────────────────────────────────────────────────────────────────┐
# │ NAVEGACIÓN: Mod+Arrows (Niri: focus-column/window-or-monitor/workspace)      │
# └──────────────────────────────────────────────────────────────────────────────┘

# Niri: Mod+Right = focus-column-or-monitor-right
#bind = SUPER, right, exec, $scroll/focus-window-or-monitor.sh r
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r

# Niri: Mod+Up/Down = focus-window-or-workspace-up/down (con script para ambas funciones)
# Foco arriba
bind = SUPER, Up, exec, $scroll/focus-window-or-workspace.sh u
bind = SUPER, Down, exec, $scroll/focus-window-or-workspace.sh d
# ┌──────────────────────────────────────────────────────────────────────────────┐
# │ MOVER COLUMNAS: Mod+Shift+Left/Right (Niri: move-column-left/right)          │
# └──────────────────────────────────────────────────────────────────────────────┘

bind = SUPER SHIFT, RIGHT, exec, $scroll/move-column-or-to-monitor.sh r
bind = SUPER SHIFT, LEFT, exec, $scroll/move-column-or-to-monitor.sh l
# ┌──────────────────────────────────────────────────────────────────────────────┐
# │ MOVER A WORKSPACE: Mod+Shift+Up/Down (Niri: move-window-to-workspace-up/down)│
# └──────────────────────────────────────────────────────────────────────────────┘

# Niri: Mod+Shift+Up = move-window-to-workspace-up
bind = SUPER SHIFT, up, movetoworkspace, e-1

# Niri: Mod+Shift+Down = move-window-to-workspace-down
bind = SUPER SHIFT, down, movetoworkspace, e+1

# ┌──────────────────────────────────────────────────────────────────────────────┐
# │ MOVER VENTANA EN COLUMNA: Mod+Ctrl+Up/Down (Niri: move-window-up/down)       │
# └──────────────────────────────────────────────────────────────────────────────┘

# Niri: Mod+Ctrl+Up = move-window-up-or-to-workspace-up
bind = SUPER CTRL, up, exec, $scroll/move-window-or-to-workspace.sh u

# Niri: Mod+Ctrl+Down = move-window-down-or-to-workspace-down
bind = SUPER CTRL, down, exec, $scroll/move-window-or-to-workspace.sh d

# ┌──────────────────────────────────────────────────────────────────────────────┐
# │ CONSUMIR/EXPULSAR: Mod+Ctrl+Left/Right (Niri: consume-or-expel-window)       │
# └──────────────────────────────────────────────────────────────────────────────┘

# Niri: Mod+Ctrl+Left = consume-or-expel-window-left
# Scrolling layout: layoutmsg, swapcol l (intercambia columnas)
bind = SUPER CTRL, left, exec, $scroll/consume-or-expel-window.sh l

# Niri: Mod+Ctrl+Right = consume-or-expel-window-right
bind = SUPER CTRL, right, exec, $scroll/consume-or-expel-window.sh r

# ┌──────────────────────────────────────────────────────────────────────────────┐
# │ WORKSPACES: Mod+1-6 (Niri: focus-workspace)                                  │
# └──────────────────────────────────────────────────────────────────────────────┘

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6


# ┌──────────────────────────────────────────────────────────────────────────────┐
# │ MOVER A WORKSPACE ESPECÍFICO: Mod+F1-F4 (Niri: move-window-to-workspace)     │
# └──────────────────────────────────────────────────────────────────────────────┘

bind = SUPER, F1, movetoworkspace, 1
bind = SUPER, F2, movetoworkspace, 2
bind = SUPER, F3, movetoworkspace, 3
bind = SUPER, F4, movetoworkspace, 4
bind = SUPER, F5, movetoworkspace, 5
bind = SUPER, F6, movetoworkspace, 6

# ┌──────────────────────────────────────────────────────────────────────────────┐
# │ OTROS DE NIRI                                                                 │
# └──────────────────────────────────────────────────────────────────────────────┘

# Niri: Mod+R = switch-preset-column-width
bind = SUPER, d, layoutmsg, colresize -conf
bind = SUPER, d, exec, hyprctl dispatch layoutmsg rollnext; hyprctl dispatch layoutmsg focusmaster


bind = SUPER, mouse:274, layoutmsg, fit active


# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                         NAVEGACIÓN ENTRE MONITORES                            ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

bind = SUPER, TAB, focusmonitor, -1
bind = SUPER, mouse:276, movewindow, mon:-1
bind = SUPER, z, movewindow, mon:-1
bind = SUPER ALT, O, exec, $monitors/monitor-control.sh toggle

# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                           CONTROLES DE MOUSE                                 ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# Cambiar focus con scroll del mouse
bind = SUPER, mouse_down,layoutmsg, focus l
bind = SUPER, mouse_up,layoutmsg, focus r
# Workspace anterior/siguiente
bind = SUPER , mouse_left, workspace, e-1
bind = SUPER , mouse_right, workspace, e+1

# Mover y redimensionar ventanas con mouse
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Intercambiar contenido entre monitores

bind = SUPER, mouse:275, exec, $monitors/swap-content.sh
bind = SUPER, x, exec, $monitors/swap-content.sh


#especial para layout master
bind = SUPER, C, exec, hyprctl dispatch layoutmsg rollnext; hyprctl dispatch layoutmsg focusmaster
bind = alt, TAB, exec, qs ipc -c overview call overview toggle
