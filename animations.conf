# --- ANIMACIONES ---
animations {
    enabled = yes

    bezier = windowIn, 0.06, 0.71, 0.25, 1
    bezier = windowResize, 0.04, 0.67, 0.38, 1
	bezier = workspacesMove, 0.1, 0.75, 0.15, 1

    animation = windowsIn, 1, 3, windowIn, slide right #popin 20%
    animation = windowsOut, 1, 3, windowIn, slide right #popin 70%
    animation = windowsMove, 1, 2.5, windowResize

    animation = border, 1, 20, default
    animation = borderangle, 1, 30, default
    animation = fade, 1, 3, default
    animation = workspaces, 1, 3, default, slidevert

}
